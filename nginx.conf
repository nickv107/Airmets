server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (replacing what we had in netlify.toml)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip compression for text assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss text/javascript;

    # Long cache for immutable assets (images + videos)
    location ~* \.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|webm|ogg|ogv|htc)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Try exact file, then directory, then fallback to index (good for clean URLs)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: block access to hidden files
    location ~ /\. {
        deny all;
    }
}